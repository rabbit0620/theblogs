{{ define "main" }}
<div class="post">
  <h1 class="post-title entry-title">{{ .Title }}</h1>
  <div class="post-meta">
    <span class="post-timestamp">{{ .Date.Format "2006-01-02" }}</span>
    {{ with .Params.categories }}
      <span class="post-labels">分类：
        {{ range . }}
          <a href="{{ "/categories/" | relURL }}{{ . | urlize }}">{{ . }}</a>
        {{ end }}
      </span>
    {{ end }}
  </div>
  <div class="post-body">
    {{ .Content }}
  </div>
  <div class="post-footer">
    {{ partial "post-copyright.html" . }}
  </div>
</div>
{{ end }}
